<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>People Dream Demo</title>
    <style>
      body {
        min-width: 280px;
        margin: 0;
        padding: 16px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11171d;
        color: #f2f7fb;
      }

      h1, p {
        margin-top: 0;
      }

      .layout {
        display: grid;
        gap: 12px;
      }

      button {
        border: 1px solid #314253;
        border-radius: 6px;
        padding: 10px 12px;
        background: #7ce4bc;
        color: #0f151c;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }

      button.secondary {
        background: #22303c;
        color: #f2f7fb;
      }

      input {
        border: 1px solid #314253;
        border-radius: 6px;
        padding: 10px 12px;
        background: #18212a;
        color: #f2f7fb;
        font: inherit;
      }

      .muted {
        color: #a6b6c5;
      }

      .panel {
        border: 1px solid #314253;
        border-radius: 6px;
        padding: 12px;
        background: #18212a;
      }

      code {
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div>
        <h1>People Dream</h1>
        <p id="status" class="muted">检查 localhost 状态中...</p>
      </div>
      <div class="layout">
        <label for="baseUrlInput" class="muted">服务地址</label>
        <input id="baseUrlInput" placeholder="http://127.0.0.1:9095">
        <button id="saveAddressButton" class="secondary">保存地址</button>
      </div>
      <div class="panel layout">
        <div>
          <strong>当前页面采集情况</strong>
        </div>
        <p id="pageStatusSummary" class="muted">读取当前页面状态中...</p>
        <p id="pageStatusUrl" class="muted"></p>
        <p id="pageStatusMeta" class="muted"></p>
      </div>
      <button id="captureButton">立即捕获当前页</button>
      <button id="pauseButton" class="secondary">切换暂停</button>
      <button id="openButton" class="secondary">打开本地面板</button>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
